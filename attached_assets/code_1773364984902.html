</div>
</div>
</div>
<div class="flex items-center justify-between">
<p class="text-white/80 text-xs font-medium">0:42</p>
<p class="text-white/80 text-xs font-medium">2:15</p>
</div>
</div>
</div>
</div>
</div>

<div class="flex flex-col gap-3 min-w-[140px] snap-start opacity-70">

<div class="flex h-6 w-full items-center gap-4">

<div class="absolute left-[82%] -top-2">
<div class="size-6 rounded-full bg-primary shadow-[0_0_15px_rgba(236,182,19,0.5)] border-4 border-background-dark cursor-pointer"></div>
</div>
</div>
</div>
<div class="mt-4 flex justify-between text-[10px] text-white/40 uppercase tracking-widest font-bold">
<span>Chill</span>
<span>Explosive</span>
</div>
</div>
</div>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mixing Console - HarmoniQ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "accent-blue": "#00f2ff",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .vertical-fader {
            appearance: none;
            width: 4px;
            height: 100%;
            background: #362348;
            outline: none;
            border-radius: 2px;
        }
        .fader-track {
            background: linear-gradient(to top, #7f13ec 0%, #00f2ff 100%);
        }
        .eq-bar {
            animation: bounce 1s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { height: 20%; }
            50% { height: 80%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-primary/10 px-4 py-4">
<div class="flex items-center justify-between gap-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white cursor-pointer">arrow_back_ios</span>
<h1 class="text-xl font-bold tracking-tight">Mixing Console</h1>
</div>
<button class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all shadow-[0_0_15px_rgba(127,19,236,0.4)]">
                Finalize Mix
            </button>
</div>
<!-- Master Volume Section -->
<div class="mt-6 px-2">
<div class="flex items-center justify-between mb-2">
<span class="text-xs font-bold uppercase tracking-widest text-[#ad92c9]">Master Output</span>
<span class="text-xs font-mono text-accent-blue">-3.2 dB</span>
</div>
<div class="flex h-1.5 w-full items-center gap-4 bg-[#362348] rounded-full overflow-hidden relative">
<div class="h-full w-[82%] bg-gradient-to-r from-primary to-accent-blue shadow-[0_0_10px_#7f13ec]"></div>
</div>
</div>
</header>
<!-- Mixer Section -->
<main class="flex-1 flex overflow-x-auto no-scrollbar py-6 px-4 gap-4 items-stretch">
<!-- Track Channel: Vocals -->
<div class="flex-1 min-w-[80px] flex flex-col items-center bg-[#1f1629] rounded-2xl p-3 border border-white/5">
<!-- EQ Visualizer -->
<div class="w-full h-12 flex items-end justify-center gap-0.5 mb-4 bg-black/20 rounded-lg p-1">
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.3s"></div>
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.2s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.4s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.15s"></div>
</div>
<!-- Fader Area -->
<div class="flex-1 relative flex flex-col items-center py-4 w-full">
<!-- Level Meter -->
<div class="absolute right-1 top-4 bottom-4 w-1 bg-black/40 rounded-full overflow-hidden">
<div class="absolute bottom-0 w-full h-[65%] bg-accent-blue/60"></div>
</div>
<!-- Vertical Fader Track -->
<div class="h-full w-1.5 bg-[#362348] rounded-full relative flex flex-col justify-end">
<div class="h-[70%] w-full bg-primary rounded-full shadow-[0_0_8px_#7f13ec]"></div>
<!-- Handle -->
<div class="absolute bottom-[68%] left-1/2 -translate-x-1/2 w-8 h-4 bg-white rounded-sm shadow-lg border border-primary/50"></div>
</div>
</div>
<!-- Controls -->
<div class="mt-4 flex flex-col gap-2 w-full">
<button class="w-full py-1.5 rounded-md bg-primary/20 border border-primary text-[10px] font-bold tracking-tighter uppercase">Solo</button>
<button class="w-full py-1.5 rounded-md bg-[#362348] text-[10px] font-bold tracking-tighter uppercase text-white/40">Mute</button>
</div>
<p class="mt-4 text-[10px] font-bold uppercase text-[#ad92c9] truncate">Vocals</p>
</div>
<!-- Track Channel: Drums -->
<div class="flex-1 min-w-[80px] flex flex-col items-center bg-[#1f1629] rounded-2xl p-3 border border-white/5">
<div class="w-full h-12 flex items-end justify-center gap-0.5 mb-4 bg-black/20 rounded-lg p-1">
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.5s"></div>
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.4s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.2s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.3s"></div>
</div>
<div class="flex-1 relative flex flex-col items-center py-4 w-full">
<div class="absolute right-1 top-4 bottom-4 w-1 bg-black/40 rounded-full overflow-hidden">
<div class="absolute bottom-0 w-full h-[85%] bg-primary/60"></div>
</div>
<div class="h-full w-1.5 bg-[#362348] rounded-full relative flex flex-col justify-end">
<div class="h-[85%] w-full bg-primary rounded-full shadow-[0_0_8px_#7f13ec]"></div>
<div class="absolute bottom-[83%] left-1/2 -translate-x-1/2 w-8 h-4 bg-white rounded-sm shadow-lg border border-primary/50"></div>
</div>
</div>
<div class="mt-4 flex flex-col gap-2 w-full">
<button class="w-full py-1.5 rounded-md bg-[#362348] text-[10px] font-bold tracking-tighter uppercase text-white/40">Solo</button>
<button class="w-full py-1.5 rounded-md bg-[#362348] text-[10px] font-bold tracking-tighter uppercase text-white/40">Mute</button>
</div>
<p class="mt-4 text-[10px] font-bold uppercase text-[#ad92c9] truncate">Drums</p>
</div>
<!-- Track Channel: Bass -->
<div class="flex-1 min-w-[80px] flex flex-col items-center bg-[#1f1629] rounded-2xl p-3 border border-white/5">
<div class="w-full h-12 flex items-end justify-center gap-0.5 mb-4 bg-black/20 rounded-lg p-1">
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.2s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.3s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.2s"></div>
</div>
<div class="flex-1 relative flex flex-col items-center py-4 w-full">
<div class="absolute right-1 top-4 bottom-4 w-1 bg-black/40 rounded-full overflow-hidden">
<div class="absolute bottom-0 w-full h-[45%] bg-accent-blue/60"></div>
</div>
<div class="h-full w-1.5 bg-[#362348] rounded-full relative flex flex-col justify-end">
<div class="h-[50%] w-full bg-primary rounded-full shadow-[0_0_8px_#7f13ec]"></div>
<div class="absolute bottom-[48%] left-1/2 -translate-x-1/2 w-8 h-4 bg-white rounded-sm shadow-lg border border-primary/50"></div>
</div>
</div>
<div class="mt-4 flex flex-col gap-2 w-full">
<button class="w-full py-1.5 rounded-md bg-[#362348] text-[10px] font-bold tracking-tighter uppercase text-white/40">Solo</button>
<button class="w-full py-1.5 rounded-md bg-red-500/20 border border-red-500 text-[10px] font-bold tracking-tighter uppercase text-red-500">Mute</button>
</div>
<p class="mt-4 text-[10px] font-bold uppercase text-[#ad92c9] truncate">Bass</p>
</div>
<!-- Track Channel: Synth -->
<div class="flex-1 min-w-[80px] flex flex-col items-center bg-[#1f1629] rounded-2xl p-3 border border-white/5">
<div class="w-full h-12 flex items-end justify-center gap-0.5 mb-4 bg-black/20 rounded-lg p-1">
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.4s"></div>
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.2s"></div>
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.5s"></div>
<div class="w-1 bg-primary rounded-full eq-bar" style="animation-delay: 0.1s"></div>
<div class="w-1 bg-accent-blue rounded-full eq-bar" style="animation-delay: 0.3s"></div>
</div>
<div class="flex-1 relative flex flex-col items-center py-4 w-full">
<div class="absolute right-1 top-4 bottom-4 w-1 bg-black/40 rounded-full overflow-hidden">
<div class="absolute bottom-0 w-full h-[60%] bg-accent-blue/60"></div>
</div>
<div class="h-full w-1.5 bg-[#362348] rounded-full relative flex flex-col justify-end">
<div class="h-[60%] w-full bg-primary rounded-full shadow-[0_0_8px_#7f13ec]"></div>
<div class="absolute bottom-[58%] left-1/2 -translate-x-1/2 w-8 h-4 bg-white rounded-sm shadow-lg border border-primary/50"></div>
</div>
</div>
<div class="mt-4 flex flex-col gap-2 w-full">
<button class="w-full py-1.5 rounded-md bg-[#362348] text-[10px] font-bold tracking-tighter uppercase text-white/40">Solo</button>
<button class="w-full py-1.5 rounded-md bg-[#362348] text-[10px] font-bold tracking-tighter uppercase text-white/40">Mute</button>
</div>
<p class="mt-4 text-[10px] font-bold uppercase text-[#ad92c9] truncate">Synth</p>
</div>
</main>
<!-- Bottom Control Bar -->
<nav class="bg-background-light dark:bg-background-dark border-t border-primary/10 px-6 py-4 pb-8">
<div class="flex items-center justify-around">
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-2xl">music_note</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Library</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<div class="relative">
<span class="material-symbols-outlined text-2xl">tune</span>
<div class="absolute -top-1 -right-1 size-2 bg-accent-blue rounded-full"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest">Mixer</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-2xl">magic_button</span>
<span class="text-[10px] font-bold uppercase tracking-widest">AI Tools</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-2xl">account_circle</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Studio</span>
</div>
</div>
</nav>
<!-- Floating Playback Controls (Optional Overlay) -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] bg-[#1f1629]/90 backdrop-blur-md border border-primary/20 rounded-2xl p-4 flex items-center justify-between shadow-2xl">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-gradient-to-br from-primary to-accent-blue flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">graphic_eq</span>
</div>
<div>
<p class="text-xs font-bold leading-none mb-1">Neon Horizons</p>
<p class="text-[10px] text-[#ad92c9] leading-none">AI Generative Mix</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white cursor-pointer hover:text-primary">skip_previous</span>
<div class="size-10 rounded-full bg-white flex items-center justify-center cursor-pointer hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-background-dark fill-1 font-bold">pause</span>
</div>
<span class="material-symbols-outlined text-white cursor-pointer hover:text-primary">skip_next</span>
</div>
</div>
</body></html>
